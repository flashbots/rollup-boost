[package]
name = "rollup-boost"
version = "0.1.0"
edition = "2021"

[dependencies]
alloy-primitives = "0.8.7"
alloy = { version = "0.4.2", features = ["eips", "rpc-types"] }
op-alloy-rpc-types-engine = "0.3.3"
op-alloy-rpc-types = "0.3.3"
alloy-rpc-types-engine = "0.4.2"
alloy-rpc-types-eth = "0.4.2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1.4"
tracing-subscriber = { version = "0.3.11", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
thiserror = "1.0"
clap = { version = "4", features = ["derive", "env"] }
jsonrpsee = {version = "0.24.4", features = ["server", "http-client", "macros"]}
lru = "0.10.0"
reqwest = "0.12.5"
http = "1.1.0"
dotenv = "0.15.0"
tower = "0.4.13"
http-body = "0.4.5"
http-body-util = "0.1.2"
hyper = { version = "1.4.1", features = ["full"] }
hyper-util = { version = "0.1", features = ["full"] }
serde_json = "1.0.96"
reth-rpc-layer = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.0.8" }
reth-optimism-payload-builder = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.0.8", features = ["optimism"] }
reth-payload-primitives = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.0.8" }
opentelemetry = "0.26.0"
opentelemetry-otlp = { version = "0.26.0", features = ["http-proto", "trace"] }
opentelemetry_sdk = { version = "0.26.0", features = ["rt-tokio"] }
tracing-opentelemetry = "0.26.0"

[dev-dependencies]
anyhow = "1.0"
assert_cmd = "2.0.10"
predicates = "3.1.2"